;==============================================================================
; Supervisor Configuration for Invent Project
;==============================================================================
; Copy this file to: /etc/supervisor/conf.d/invent-worker.conf
; Then run: supervisorctl reread && supervisorctl update
;
; IMPORTANT: Update paths below to match your VDS server.
;
; One queue:watchdog daemon keeps every dedicated worker in config/queue_workers.php
; alive. Each spawned worker uses --queue=<name> only — never the default queue.
;==============================================================================

; Optional generic default-queue worker — DISABLED by default.
;[program:invent-worker]
;command=/usr/bin/php /var/www/invent/artisan queue:work --sleep=3 --tries=3 --timeout=120 --max-time=3600
;directory=/var/www/invent
;autostart=false
;autorestart=true
;user=www-data
;numprocs=1
;redirect_stderr=true
;stdout_logfile=/var/www/invent/storage/logs/worker.log

[program:invent-queue-watchdog-daemon]
process_name=%(program_name)s
command=/usr/bin/php /var/www/invent/artisan queue:watchdog
directory=/var/www/invent
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/invent/storage/logs/queue-watchdog-daemon.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=30
stopsignal=SIGTERM

; Individual queue:work programs are optional when invent-queue-watchdog-daemon runs.
; The watchdog spawns and restarts each dedicated worker from config/queue_workers.php.
;
;[program:invent-google-maps-extractor-worker]
;command=/usr/bin/php /var/www/invent/artisan queue:work database --queue=google-maps-extractor --sleep=3 --tries=1 --timeout=3700 --max-time=7200
;directory=/var/www/invent
;autostart=false
;autorestart=true
;user=www-data
;numprocs=1
;redirect_stderr=true
;stdout_logfile=/var/www/invent/storage/logs/google-maps-extractor-worker.log
