;==============================================================================
; Supervisor Configuration for Invent Project
;==============================================================================
; Copy this file to: /etc/supervisor/conf.d/invent-worker.conf
; Then run: supervisorctl reread && supervisorctl update && supervisorctl start invent-worker:*
;
; IMPORTANT: Update paths below to match your VDS server.
;
; WARNING: Do NOT use a generic `queue:work` without --queue for production unless
; you intend to process the default queue. Use dedicated programs per queue.
;==============================================================================

; Optional generic default-queue worker — DISABLED by default.
; Uncomment only if you explicitly want jobs on the default queue processed here.
;
;[program:invent-worker]
;process_name=%(program_name)s_%(process_num)02d
;command=/usr/bin/php /var/www/invent/artisan queue:work --sleep=3 --tries=3 --timeout=120 --max-time=3600
;directory=/var/www/invent
;autostart=false
;autorestart=true
;user=www-data
;numprocs=1
;redirect_stderr=true
;stdout_logfile=/var/www/invent/storage/logs/worker.log
;stdout_logfile_maxbytes=10MB
;stdout_logfile_backups=5
;stopwaitsecs=3600
;stopsignal=SIGTERM

[program:invent-google-maps-extractor-watchdog]
process_name=%(program_name)s
; Permanent daemon: only starts queue:work --queue=google-maps-extractor
command=/usr/bin/php /var/www/invent/artisan queue:watchdog
directory=/var/www/invent
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/invent/storage/logs/queue-watchdog-daemon.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=30
stopsignal=SIGTERM

[program:invent-google-maps-extractor-worker]
process_name=%(program_name)s_%(process_num)02d
; Dedicated worker for Google Maps extractor jobs ONLY (--queue=google-maps-extractor).
command=/usr/bin/php /var/www/invent/artisan queue:work database --queue=google-maps-extractor --sleep=3 --tries=1 --timeout=3700 --max-time=7200
directory=/var/www/invent
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/invent/storage/logs/google-maps-extractor-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=3600
stopsignal=SIGTERM

[program:invent-shopify-image-pull-worker]
process_name=%(program_name)s_%(process_num)02d
; Dedicated worker for Image Master Shopify pull jobs only.
command=/usr/bin/php /var/www/invent/artisan queue:work --queue=shopify-image-pull --sleep=3 --tries=1 --timeout=14400 --max-time=14400
directory=/var/www/invent
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/invent/storage/logs/shopify-image-pull-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=14400
stopsignal=SIGTERM

[program:invent-shopify-bullet-pull-worker]
process_name=%(program_name)s_%(process_num)02d
; Dedicated worker for Bullet Points Master Shopify pull jobs only.
command=/usr/bin/php /var/www/invent/artisan queue:work --queue=shopify-bullet-pull --sleep=3 --tries=1 --timeout=14400 --max-time=14400
directory=/var/www/invent
autostart=true
autorestart=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/invent/storage/logs/shopify-bullet-pull-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=14400
stopsignal=SIGTERM
