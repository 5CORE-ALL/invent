; Bullet Points Master pull worker - processes RunShopifyBulletPullJob only
; Copy to /etc/supervisor/conf.d/shopify-bullet-pull-worker.conf on server
; Run: sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start shopify-bullet-pull-worker:*
;
; UPDATE paths and user to match production (inventory_5c_usr on droplet).

[program:shopify-bullet-pull-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/inventory_5c_usr/data/www/inventory.5coremanagement.com/artisan queue:work database --queue=shopify-bullet-pull --sleep=3 --tries=1 --timeout=14400 --max-time=14400
directory=/var/www/inventory_5c_usr/data/www/inventory.5coremanagement.com
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=inventory_5c_usr
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/inventory_5c_usr/data/www/inventory.5coremanagement.com/storage/logs/shopify-bullet-pull-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=14400
stopsignal=SIGTERM
