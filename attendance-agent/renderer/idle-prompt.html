<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>5Core Attendance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e293b;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            -webkit-app-region: no-drag;
        }
        .popup {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 18px;
            text-align: center;
            overflow: hidden;
            min-height: 0;
        }
        .icon { font-size: 32px; line-height: 1; margin-bottom: 8px; flex-shrink: 0; }
        .phase { width: 100%; flex-shrink: 0; }
        .phase.hidden { display: none; }
        h1 { font-size: 1.05rem; margin-bottom: 10px; line-height: 1.25; }
        .actions { display: flex; gap: 8px; width: 100%; }
        button {
            padding: 10px 8px;
            border: none;
            border-radius: 10px;
            font-size: 0.84rem;
            font-weight: 600;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        button:disabled { opacity: 0.6; cursor: wait; }
        .actions button { flex: 1; }
        .yes { background: #22c55e; color: #fff; }
        .no { background: #475569; color: #fff; }
        .ok {
            width: 100%;
            background: #3b82f6;
            color: #fff;
        }
        .stat-box {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            width: 100%;
        }
        .countdown-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .idle-box {
            background: rgba(249, 115, 22, 0.12);
            border: 1px solid rgba(249, 115, 22, 0.35);
        }
        .stat-box .lbl {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }
        .countdown-box .lbl { color: #93c5fd; }
        .idle-box .lbl { color: #fdba74; }
        .stat-box .val {
            font-size: 1.35rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }
        .countdown-box .val { color: #60a5fa; }
        .idle-box .val { color: #fb923c; }
        #phaseIdle .idle-box { margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="popup">
        <div class="icon" id="icon">⏱</div>

        <div class="phase" id="phaseConfirm">
            <h1>Are you still working?</h1>
            <div class="stat-box countdown-box">
                <div class="lbl">Time remaining</div>
                <div class="val" id="countdownTime">1:00</div>
            </div>
            <div class="stat-box idle-box">
                <div class="lbl">Idle time</div>
                <div class="val" id="idleTime">00:00:00</div>
            </div>
            <div class="actions">
                <button type="button" class="yes" id="btnYes">Yes, working</button>
                <button type="button" class="no" id="btnNo">No, take a break</button>
            </div>
        </div>

        <div class="phase hidden" id="phaseIdle">
            <h1>Idle time</h1>
            <div class="stat-box idle-box">
                <div class="lbl">Idle time</div>
                <div class="val" id="idleTimeIdle">00:00:00</div>
            </div>
            <button type="button" class="ok" id="btnOk">OK</button>
        </div>
    </div>
    <script src="idle-prompt.js"></script>
</body>
</html>
